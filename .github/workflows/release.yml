name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      # 标准 arm64 runner 内存为 7GB；限制 SwiftPM 并行编译，避免编译结束时测试进程被 SIGKILL。
      LULU_SWIFT_JOBS: "2"
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate runner and tag
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]]
          repository_version="$(tr -d '[:space:]' < VERSION)"
          [[ "$GITHUB_REF_NAME" == "v$repository_version" ]]

      - name: Build test runner
        run: swift build --jobs "$LULU_SWIFT_JOBS" --product eureka-tests

      - name: Run all tests
        shell: bash
        run: |
          set -euo pipefail
          test_binary="$(swift build --show-bin-path)/eureka-tests"
          "$test_binary"

      - name: Build and verify signed release assets
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "$SPARKLE_EDDSA_PRIVATE_KEY" ]]
          Scripts/package-release.sh "${GITHUB_REF_NAME#v}"

      # 公开 Release 是最后一步；前面的测试、签名、appcast 或冒烟检查失败时不会执行。
      - name: Create stable GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          repository_version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/lulu-lumei-dock-${repository_version}.zip" \
            "dist/appcast.xml" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest
